name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feat"
      - "feature"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
  default: "patch"

categories:
  - title: "🚀 Added"
    labels:
      - "feat"
      - "feature"
      - "enhancement"
  - title: "🔄 Changed"
    labels:
      - "refactor"
      - "performance"
      - "change"
  - title: "🐛 Fixed"
    labels:
      - "fix"
      - "bug"
  - title: "📝 Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "🔒 Security"
    labels:
      - "security"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"

template: |
  ## What's Changed

  $CHANGES

  *Thank you to our amazing contributors!*